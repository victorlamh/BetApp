name: Build IPA

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned IPA
        run: |
          xcodebuild \
            -scheme BetApp \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -archivePath $PWD/build/BetApp.xcarchive \
            clean archive

          mkdir -p Payload
          cp -r build/BetApp.xcarchive/Products/Applications/BetApp.app Payload/
          zip -r BetApp.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BetApp
          path: BetApp.ipa

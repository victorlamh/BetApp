name: BetApp
options:
  bundleIdPrefix: com.victorlamh
  deploymentTarget:
    iOS: "17.0"

targets:
  BetApp:
    type: application
    platform: iOS
    sources:
      - BetApp
    info:
      path: BetApp/Info.plist
      properties:
        CFBundleDisplayName: BetApp
        CFBundleName: BetApp
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.victorlamh.betapp
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
